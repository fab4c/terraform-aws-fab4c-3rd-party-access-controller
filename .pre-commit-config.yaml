repos:

- repo: git@fab4c.gitlab.com:fab4cloud/devtools/pre-commit-iac.git
  rev: 0.1.1
  hooks:
    - id: fab4c_repo_contributors
    - id: fab4c_tf_module_open_repo_contents
    - id: fab4c_tf_module_validate_schema
    - id: fab4c_tf_module_generate_docs
    - id: fab4c_tf_module_generate_readme

- repo: https://github.com/tofuutils/pre-commit-opentofu
  rev: v2.2.2
  hooks:
    - id: tofu_fmt
    - id: tofu_tflint
      args:
        - --args=--disable-rule=terraform_deprecated_lookup
